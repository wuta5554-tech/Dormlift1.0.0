<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormLift Pro | Peer Logistics Network</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #4f46e5; --success: #059669; --warning: #f59e0b; --danger: #dc2626; --text: #334155; --bg: #f8fafc; --surface: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        
        .page { display: none !important; }
        .page.active { display: block !important; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        nav { background: white; padding: 1rem 8%; display: flex; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; color: #0f172a; cursor: pointer; }
        
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: var(--surface); border-radius: 1rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 1.5rem; }

        /* 市场列表：无图高密度样式 */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
        .task-card { cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; background: white; border-radius: 1rem; padding: 1.2rem; display: flex; flex-direction: column; gap: 8px; }
        .task-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .reward-badge { font-size: 1.25rem; font-weight: 800; color: var(--success); }
        .info-row { display: flex; align-items: flex-start; gap: 8px; font-size: 0.9rem; }
        .info-row i { color: var(--primary); width: 16px; margin-top: 4px; }
        .meta-text { font-size: 0.8rem; color: #64748b; }

        /* 详情弹窗与缩略图 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 650px; max-height: 90vh; overflow-y: auto; border-radius: 1.5rem; padding: 2rem; position: relative; }
        
        .thumb-strip { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 1rem; }
        .thumb-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; }

        /* 互动区：留言与评价 */
        .interaction-section { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; margin-top: 1.5rem; border: 1px solid #e2e8f0; }
        .comment-item { background: white; padding: 0.8rem; border-radius: 0.8rem; margin-bottom: 0.8rem; font-size: 0.9rem; border: 1px solid #f1f5f9; }
        .star-rating { color: var(--warning); display: flex; gap: 5px; margin: 10px 0; font-size: 1.2rem; }
        .star-rating i { cursor: pointer; }

        .btn { background: var(--primary); color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 0.6rem; cursor: pointer; font-weight: 700; width: 100%; }
        input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-bottom: 1rem; box-sizing: border-box; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="navigate('home')">DormLift Pro</div>
    <div class="nav-links" id="menu"></div>
</nav>

<div class="container">
    <div id="home" class="page active">
        <section class="card" style="text-align:center; padding: 4rem 1rem;">
            <h1>Moving, Made Effortless.</h1>
            <p>Connect with verified UoA peers for safe campus logistics.</p>
            <div style="display:flex; justify-content:center; gap:1rem; margin-top:2rem;">
                <button class="btn" style="width:auto" onclick="navigate('post-task')">Post Task</button>
                <button class="btn" style="width:auto; background:#f1f5f9; color:#334155" onclick="navigate('hall')">Market</button>
            </div>
        </section>
    </div>

    <div id="hall" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <h2 style="margin:0;">Task Market</h2>
            <button class="btn" style="width:auto" onclick="loadHall()"><i class="fas fa-sync"></i></button>
        </div>
        <div id="hall_list" class="task-grid"></div>
    </div>

    <div id="post-task" class="page">
        <div class="card">
            <h2>Post Logistics Request</h2>
            <form id="taskForm">
                <input type="text" id="p_from" placeholder="Pickup (Auto-fills on map click)" required>
                <input type="text" id="p_to" placeholder="Destination (Auto-fills on map click)" required>
                <input type="datetime-local" id="p_date" required>
                <input type="text" id="p_reward" placeholder="Reward Offer (e.g. $50)" required>
                <textarea id="p_desc" placeholder="Items & Instructions..." rows="3" required></textarea>
                <input type="file" id="p_file" multiple accept="image/*" required>
                <button type="submit" class="btn">Publish to Market</button>
            </form>
        </div>
    </div>

    <div id="profile" class="page">
        <div class="card"><h2 id="u_name">Profile</h2><div id="my_posts"></div><button class="btn" style="background:var(--danger); margin-top:2rem" onclick="nukeDatabase()">Nuke Data (DEV)</button></div>
    </div>

    <div id="login" class="page"><div class="card" style="max-width:400px; margin:auto;"><h2>Login</h2><form id="loginForm"><input type="email" id="l_email" placeholder="Email"><input type="password" id="l_pwd" placeholder="Password"><button class="btn">Login</button></form></div></div>
    <div id="register" class="page"><div class="card" style="max-width:400px; margin:auto;"><h2>Register</h2><form id="regForm"><input type="text" id="r_full" placeholder="Full Name"><input type="text" id="r_anon" placeholder="Nickname"><input type="email" id="r_email" placeholder="Email"><input type="text" id="r_phone" placeholder="Phone"><input type="password" id="r_pwd" placeholder="Password"><button class="btn">Register</button></form></div></div>
</div>

<div id="taskModal" class="modal" onclick="if(event.target.id==='taskModal') this.style.display='none'">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <h3 id="m_reward" class="reward-badge"></h3>
            <button onclick="document.getElementById('taskModal').style.display='none'" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>

        <div id="m_thumbs" class="thumb-strip"></div>

        <div id="m_details" style="display:flex; flex-direction:column; gap:10px; margin: 1rem 0;">
            </div>

        <div id="m_interaction" class="interaction-section"></div>

        <div style="margin-top:1.5rem;">
            <button class="btn" id="m_action_btn">Accept Task</button>
        </div>
    </div>
</div>

<script>
    let user = JSON.parse(localStorage.getItem('user'));
    let marketTasks = [];
    let selectedRating = 5;

    function navigate(p) {
        if(!user && ['post-task', 'profile'].includes(p)) p = 'login';
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        if(p==='hall') loadHall();
        if(p==='profile') loadProfile();
        updateMenu();
    }

    function updateMenu() {
        const m = document.getElementById('menu');
        m.innerHTML = user ? `<a onclick="navigate('hall')">Market</a> <a onclick="navigate('post-task')">Post</a> <a onclick="navigate('profile')">Profile</a>` : `<a onclick="navigate('login')">Login</a>`;
    }

    // 核心：加载高密度市场列表
    async function loadHall() {
        const res = await fetch('/api/task/all');
        const data = await res.json();
        marketTasks = data.list;

        document.getElementById('hall_list').innerHTML = data.list.map(t => {
            const fromStr = t.from_addr.includes('@@') ? t.from_addr.split('@@')[1] : t.from_addr;
            const toStr = t.to_addr.includes('@@') ? t.to_addr.split('@@')[1] : t.to_addr;
            const postDate = new Date(t.created_at).toLocaleDateString();

            return `
            <div class="task-card" onclick="showTaskDetail('${t._id}')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="reward-badge">${t.reward}</span>
                    <span class="meta-text">Posted: ${postDate}</span>
                </div>
                <div class="info-row"><i class="fas fa-circle"></i> <b>From:</b> ${fromStr}</div>
                <div class="info-row"><i class="fas fa-location-arrow"></i> <b>To:</b> ${toStr}</div>
                <div class="info-row"><i class="fas fa-box"></i> <b>Items:</b> ${t.items_desc.substring(0, 50)}...</div>
                <div class="info-row"><i class="fas fa-user-circle"></i> <b>By:</b> ${t.publisher_id.split('@')[0]} (Student)</div>
                <div class="info-row"><i class="far fa-clock"></i> <b>Move:</b> ${t.move_date.replace('T', ' ')}</div>
            </div>`;
        }).join('') || '<p>Market is currently empty.</p>';
    }

    // 核心：显示互动详情
    function showTaskDetail(id) {
        const t = marketTasks.find(x => x._id === id);
        const modal = document.getElementById('taskModal');
        const isOwner = user && user.email === t.publisher_id;

        document.getElementById('m_reward').innerText = t.reward;
        
        // 缩略图预览
        let imgs = JSON.parse(t.img_url || '[]');
        document.getElementById('m_thumbs').innerHTML = imgs.map(url => `
            <img src="${url}" class="thumb-img" onclick="window.open('${url}')">
        `).join('') || '<small>No photos</small>';

        document.getElementById('m_details').innerHTML = `
            <p><b>Pickup:</b> ${t.from_addr.split('@@')[1] || t.from_addr}</p>
            <p><b>Dest:</b> ${t.to_addr.split('@@')[1] || t.to_addr}</p>
            <p><b>Items:</b> ${t.items_desc}</p>
        `;

        // 动态加载互动区
        const interArea = document.getElementById('m_interaction');
        if (t.status !== 'finished') {
            // 留言模式 (Q&A)
            interArea.innerHTML = `
                <h4>Questions & Comments</h4>
                <div id="comment_list" style="margin-bottom:1rem;">
                    ${(t.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('') || '<p style="font-size:0.8rem">No questions yet.</p>'}
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="comment_input" placeholder="Ask publisher..." style="margin:0">
                    <button class="btn" style="width:80px" onclick="postComment('${t._id}')">Send</button>
                </div>
            `;
        } else {
            // 评价模式 (Reviews)
            interArea.innerHTML = `
                <h4>Task Reviews</h4>
                <div id="review_list">
                    ${t.reviews?.publisher_review ? `<div class="review-item"><b>Owner:</b> ${'⭐'.repeat(t.reviews.publisher_review.rating)}<br>${t.reviews.publisher_review.text}</div>` : ''}
                    ${t.reviews?.helper_review ? `<div class="review-item"><b>Helper:</b> ${'⭐'.repeat(t.reviews.helper_review.rating)}<br>${t.reviews.helper_review.text}</div>` : ''}
                </div>
                ${renderReviewForm(t)}
            `;
        }

        const actionBtn = document.getElementById('m_action_btn');
        if (t.status === 'pending' && !isOwner) {
            actionBtn.style.display = 'block';
            actionBtn.innerText = "Accept Task";
            actionBtn.onclick = () => acceptTask(id);
        } else {
            actionBtn.style.display = 'none';
        }

        modal.style.display = 'flex';
    }

    // 渲染评价表单逻辑
    function renderReviewForm(task) {
        const isOwner = user.email === task.publisher_id;
        const isHelper = user.email === task.helper_id;
        const hasOwnerReviewed = task.reviews?.publisher_review;
        const hasHelperReviewed = task.reviews?.helper_review;

        if ((isOwner && !hasOwnerReviewed) || (isHelper && !hasHelperReviewed)) {
            return `
                <div style="margin-top:1.5rem; border-top:1px dashed #ccc; padding-top:1rem;">
                    <b>Rate your partner:</b>
                    <div class="star-rating" id="star_box">
                        ${[1,2,3,4,5].map(i => `<i class="fas fa-star" onclick="setStar(${i})"></i>`).join('')}
                    </div>
                    <textarea id="rev_text" placeholder="Share your experience..."></textarea>
                    <button class="btn" onclick="submitReview('${task._id}', '${isOwner?'publisher':'helper'}')">Submit Review</button>
                </div>
            `;
        }
        return '';
    }

    function setStar(n) {
        selectedRating = n;
        const stars = document.querySelectorAll('#star_box i');
        stars.forEach((s, i) => s.style.color = (i < n) ? 'var(--warning)' : '#ccc');
    }

    async function submitReview(taskId, role) {
        const text = document.getElementById('rev_text').value;
        await fetch('/api/task/review', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ task_id: taskId, role, rating: selectedRating, text })
        });
        alert("Review submitted!");
        location.reload();
    }

    async function postComment(taskId) {
        const text = document.getElementById('comment_input').value;
        if(!text) return;
        await fetch('/api/task/comment', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ task_id: taskId, comment: { user: user.anonymous_name, text, time: new Date() } })
        });
        location.reload();
    }

    // --- 其他工具函数 ---
    async function acceptTask(id) {
        await fetch('/api/task/workflow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id, status:'assigned', helper_id:user.email})});
        navigate('profile');
    }
    async function nukeDatabase() { if(prompt("Type YES to wipe")==="YES") { await fetch('/api/dev/nuke', {method:'POST'}); localStorage.clear(); location.reload(); }}
    async function loadProfile() {
        document.getElementById('u_name').innerText = user.anonymous_name;
        const res = await fetch('/api/user/dashboard', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:user.email})});
        const d = await res.json();
        document.getElementById('my_posts').innerHTML = d.list.map(t => `<div class="card"><b>${t.reward}</b> - ${t.status} <button class="btn btn-outline" style="width:auto; padding:5px" onclick="showTaskDetail('${t._id}')">View/Review</button></div>`).join('');
    }
    document.getElementById('regForm').onsubmit = async e => {
        e.preventDefault();
        const b = { full_name: document.getElementById('r_full').value, anonymous_name: document.getElementById('r_anon').value, email: document.getElementById('r_email').value, phone: document.getElementById('r_phone').value, password: document.getElementById('r_pwd').value };
        await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
        navigate('login');
    };
    document.getElementById('loginForm').onsubmit = async e => {
        e.preventDefault();
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email: document.getElementById('l_email').value, password: document.getElementById('l_pwd').value})});
        const d = await res.json();
        if(d.success) { user = d.user; localStorage.setItem('user', JSON.stringify(user)); navigate('home'); }
    };

    updateMenu(); navigate('home');
</script>
</body>
</html>
