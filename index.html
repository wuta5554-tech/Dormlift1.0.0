<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <!-- 引入Font Awesome图标库（用于点赞/评论图标） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        :root {
            --primary: #2563eb;
            --muted: #64748b;
            --light: #f1f5f9;
            --dark: #1e293b;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--light);
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 2rem;
        }

        /* 标签容器样式 */
        .tab-container {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
            scrollbar-width: thin;
        }

        .tab-container::-webkit-scrollbar {
            height: 4px;
        }

        .tab-container::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 2px;
        }

        /* 标签按钮样式 */
        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 1rem;
            text-align: center;
            font-weight: 800;
            font-size: 1.05rem;
            border-radius: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--muted);
            border: none;
            background: transparent;
            white-space: nowrap;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            box-shadow: var(--card-shadow);
        }

        .tab-btn:hover:not(.active) {
            color: var(--primary);
            background-color: rgba(37, 99, 235, 0.1);
        }

        /* 标签内容区样式 */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        /* 卡片通用样式 */
        .card {
            background-color: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1rem;
        }

        .text-muted {
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* 社区动态（Share Buzz）专属样式 */
        .forum-feed {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .forum-card {
            background-color: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
        }

        .m-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .tab-btn {
                min-width: 100px;
                padding: 0.8rem;
                font-size: 0.9rem;
            }

            .forum-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <h1 class="page-title">My Dashboard</h1>

    <!-- 标签按钮容器 -->
    <div class="tab-container">
        <button class="tab-btn active" data-tab="logistics">Logistics</button>
        <button class="tab-btn" data-tab="market">Sell Item</button>
        <button class="tab-btn" data-tab="flatting">Flatting</button>
        <button class="tab-btn" data-tab="teamup">Team-Up</button>
        <button class="tab-btn" data-tab="sharebuzz">Share Buzz</button>
    </div>

    <!-- 标签内容区 -->
    <!-- 1. 物流标签内容 -->
    <div class="tab-content active" id="logistics-content">
        <div class="card">
            <h3 class="card-title">Logistics Tasks</h3>
            <div id="logistics-feed" class="text-muted">Loading logistics data...</div>
        </div>
    </div>

    <!-- 2. 二手交易标签内容 -->
    <div class="tab-content" id="market-content">
        <div class="card">
            <h3 class="card-title">Sell Item Listings</h3>
            <div id="market-feed" class="text-muted">Loading market data...</div>
        </div>
    </div>

    <!-- 3. 租房标签内容 -->
    <div class="tab-content" id="flatting-content">
        <div class="card">
            <h3 class="card-title">Flatting Info</h3>
            <div id="flatting-feed" class="text-muted">Loading flatting data...</div>
        </div>
    </div>

    <!-- 4. 组队标签内容 -->
    <div class="tab-content" id="teamup-content">
        <div class="card">
            <h3 class="card-title">Team-Up Activities</h3>
            <div id="teamup-feed" class="text-muted">Loading team-up data...</div>
        </div>
    </div>

    <!-- 5. 社区动态标签内容 -->
    <div class="tab-content" id="sharebuzz-content">
        <div class="forum-feed" id="buzz-feed">Loading share buzz data...</div>
    </div>

    <script>
        // 全局变量：当前登录用户（需根据你的登录逻辑替换，比如从localStorage获取）
        const currentUser = {
            email: localStorage.getItem('userEmail') || 'test@example.com' // 示例邮箱，需替换为真实登录用户邮箱
        };

        // ====================== 标签切换核心逻辑 ======================
        function switchTab(tabName) {
            // 移除所有按钮的active类
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // 给当前点击的按钮加active
            const targetBtn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
            if (targetBtn) targetBtn.classList.add('active');
            
            // 移除所有内容区的active类
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            // 显示对应内容区
            const targetContent = document.getElementById(`${tabName}-content`);
            if (targetContent) targetContent.classList.add('active');
        }

        // 绑定所有标签按钮的点击事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                switchTab(tabName);
            });
        });

        // ====================== 数据加载与渲染逻辑 ======================
        // 主函数：加载Dashboard所有数据
        async function loadProfileData(email) {
            if (!email) {
                console.error('用户邮箱为空，无法加载数据');
                return;
            }

            try {
                const res = await fetch('/api/user/dashboard', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (!res.ok) throw new Error(`HTTP错误：${res.status}`);
                const data = await res.json();
                
                if (data.success) {
                    // 渲染各标签数据
                    renderLogistics(data.tasks || []);    // 物流
                    renderMarket(data.market || []);      // 二手交易
                    renderFlatting(data.flatting || []);  // 租房
                    renderTeamUp(data.teamups || []);     // 组队
                    renderShareBuzz(data.posts || []);    // 社区动态
                } else {
                    throw new Error(data.message || '加载数据失败');
                }
            } catch (e) {
                console.error('加载Dashboard数据失败:', e);
                // 给所有标签显示错误提示
                document.getElementById('logistics-feed').innerHTML = `<p class="text-muted">加载失败：${e.message}</p>`;
                document.getElementById('market-feed').innerHTML = `<p class="text-muted">加载失败：${e.message}</p>`;
                document.getElementById('flatting-feed').innerHTML = `<p class="text-muted">加载失败：${e.message}</p>`;
                document.getElementById('teamup-feed').innerHTML = `<p class="text-muted">加载失败：${e.message}</p>`;
                document.getElementById('buzz-feed').innerHTML = `<p class="text-muted">加载失败：${e.message}</p>`;
            }
        }

        // 1. 渲染物流数据
        function renderLogistics(tasks) {
            const feed = document.getElementById('logistics-feed');
            if (tasks.length === 0) {
                feed.innerHTML = '<p class="text-muted">No logistics tasks found.</p>';
                return;
            }

            feed.innerHTML = tasks.map(task => `
                <div class="card" style="margin-bottom: 1rem;">
                    <h4 style="font-size: 1rem; font-weight: 700;">${task.title}</h4>
                    <p style="margin: 0.5rem 0;">${task.description || 'No description'}</p>
                    <p class="text-muted">Deadline: ${new Date(task.deadline).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        // 2. 渲染二手交易数据
        function renderMarket(marketItems) {
            const feed = document.getElementById('market-feed');
            if (marketItems.length === 0) {
                feed.innerHTML = '<p class="text-muted">No sell item listings found.</p>';
                return;
            }

            feed.innerHTML = marketItems.map(item => `
                <div class="card" style="margin-bottom: 1rem;">
                    <h4 style="font-size: 1rem; font-weight: 700;">${item.name}</h4>
                    <p class="text-muted">Price: $${item.price || 0}</p>
                    <p style="margin: 0.5rem 0;">${item.description || 'No description'}</p>
                    ${item.img_url ? `<img src="${item.img_url}" class="m-img" style="max-height: 200px; margin: 0.5rem 0;" />` : ''}
                </div>
            `).join('');
        }

        // 3. 渲染租房数据
        function renderFlatting(flattingList) {
            const feed = document.getElementById('flatting-feed');
            if (flattingList.length === 0) {
                feed.innerHTML = '<p class="text-muted">No flatting info found.</p>';
                return;
            }

            feed.innerHTML = flattingList.map(flat => `
                <div class="card" style="margin-bottom: 1rem;">
                    <h4 style="font-size: 1rem; font-weight: 700;">${flat.address || 'Unknown Address'}</h4>
                    <p style="margin: 0.5rem 0;">Rent: $${flat.rent || 0}/month</p>
                    <p class="text-muted">Rooms: ${flat.rooms || 1} | Move-in: ${new Date(flat.move_in_date).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        // 4. 渲染组队数据
        function renderTeamUp(teamups) {
            const feed = document.getElementById('teamup-feed');
            if (teamups.length === 0) {
                feed.innerHTML = '<p class="text-muted">No team-up activities found.</p>';
                return;
            }

            feed.innerHTML = teamups.map(team => `
                <div class="card" style="margin-bottom: 1rem;">
                    <h4 style="font-size: 1rem; font-weight: 700;">${team.title}</h4>
                    <p style="margin: 0.5rem 0;">${team.activity || 'No activity description'}</p>
                    <p class="text-muted">Participants: ${team.participants || 0} | Date: ${new Date(team.date).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        // 5. 渲染社区动态数据
        function renderShareBuzz(posts) {
            const feed = document.getElementById('buzz-feed');
            if (posts.length === 0) {
                feed.innerHTML = '<p class="text-muted">No shared buzz yet.</p>';
                return;
            }

            feed.innerHTML = posts.map(post => `
                <div class="forum-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0; font-weight: 800; font-size: 1.1rem;">${post.author_name || 'Anonymous'}</h3>
                        <span style="color: var(--muted); font-size: 0.85rem;">
                            ${new Date(post.created_at || Date.now()).toLocaleDateString()}
                        </span>
                    </div>
                    <p style="margin: 1rem 0; line-height: 1.5;">${post.content || 'No content'}</p>
                    
                    <!-- 动态图片 -->
                    ${post.img_url && JSON.parse(post.img_url).length > 0 
                        ? `<img src="${JSON.parse(post.img_url)[0]}" class="m-img" style="border-radius: 0.5rem; margin: 1rem 0;" />` 
                        : ''}
                    
                    <!-- 点赞交互 -->
                    <div style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                        <button onclick="interactPost('${post._id}', 'like', '${currentUser.email}')" 
                                style="border: none; background: transparent; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas ${post.likes?.includes(currentUser.email) ? 'fa-heart' : 'fa-heart-o'}"></i>
                            <span>${post.likes?.length || 0} Likes</span>
                        </button>
                    </div>
                    
                    <!-- 评论区 -->
                    <div style="margin-top: 1.5rem;">
                        <h4 style="font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5rem;">Comments</h4>
                        ${post.comments?.length > 0 
                            ? post.comments.map(cmt => `<p style="font-size: 0.9rem; margin: 0.3rem 0;">${cmt}</p>`).join('') 
                            : '<p style="font-size: 0.9rem; color: var(--muted);">No comments yet.</p>'}
                    </div>
                </div>
            `).join('');
        }

        // ====================== 社区动态交互逻辑 ======================
        // 点赞/评论等交互函数
        async function interactPost(postId, action, email) {
            if (!postId || !action || !email) {
                alert('Missing required information for interaction');
                return;
            }

            try {
                const res = await fetch('/api/forum/interact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_id: postId, action, email })
                });

                if (!res.ok) throw new Error(`Interaction failed: ${res.status}`);
                const data = await res.json();
                
                if (data.success) {
                    // 重新加载数据，刷新状态
                    loadProfileData(currentUser.email);
                } else {
                    throw new Error(data.message || 'Interaction failed');
                }
            } catch (e) {
                console.error('Post interaction failed:', e);
                alert(`Failed to ${action}: ${e.message}`);
            }
        }

        // ====================== 页面初始化 ======================
        // 页面加载完成后自动加载数据
        window.addEventListener('DOMContentLoaded', () => {
            // 确保用户已登录（需根据你的登录逻辑调整）
            if (currentUser.email) {
                loadProfileData(currentUser.email);
            } else {
                alert('Please login first!');
                // 跳转到登录页（根据你的路由调整）
                // window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
