<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormLift Pro | Professional Peer Logistics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        :root { --primary: #4f46e5; --success: #059669; --warning: #f59e0b; --danger: #dc2626; --dark: #0f172a; --text: #334155; --muted: #64748b; --bg: #f8fafc; --surface: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* 页面切换动画 */
        .page { display: none !important; opacity: 0; }
        .page.active { display: block !important; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 导航栏 */
        nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 1rem 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--dark); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
        .user-tag { background: #eff6ff; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; border: 1px solid #dbeafe; }

        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: var(--surface); border-radius: 1.2rem; padding: 2.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 2rem; }

        /* 按钮与表单 */
        .btn { background: var(--primary); color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 0.6rem; cursor: pointer; font-weight: 700; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; text-decoration: none; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-outline { background: white; color: var(--text); border: 1.5px solid #cbd5e1; }
        .btn-danger { background: white; color: var(--danger); border: 2.5px solid var(--danger); }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; width: auto; }
        
        input, select, textarea { width: 100%; padding: 0.8rem 1rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 0.6rem; margin-bottom: 1rem; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        /* 市场高密度样式 */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
        .task-card { cursor: pointer; transition: 0.3s; padding: 1.5rem; background: white; border-radius: 1rem; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        .task-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .reward-tag { font-size: 1.4rem; font-weight: 800; color: var(--success); }
        .info-row { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; }
        .info-row i { color: var(--primary); width: 16px; margin-top: 4px; }

        /* 模态框与缩略图 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); z-index: 2000; backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto; border-radius: 1.5rem; padding: 2.5rem; position: relative; }
        .thumb-strip { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; }
        .thumb-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; }
        
        .interaction-box { background: #f8fafc; border-radius: 1rem; padding: 1.5rem; margin-top: 1.5rem; border: 1px solid #e2e8f0; }
        .comment-item { background: white; padding: 0.8rem; border-radius: 0.8rem; margin-bottom: 0.8rem; border: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        #map { height: 350px; border-radius: 1rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="navigate('home')"><i class="fas fa-box-open"></i> DormLift Pro</div>
    <div class="nav-links" id="menu"></div>
</nav>

<div class="container">
    <div id="home" class="page active">
        <section class="card" style="text-align:center; padding: 5rem 1rem;">
            <h1>Campus Moving, <span style="color:var(--primary)">Simplified.</span></h1>
            <p style="color:var(--muted); font-size:1.1rem; margin: 1.5rem 0;">Trusted peer logistics for UoA students.</p>
            <div style="display:flex; justify-content:center; gap:1.2rem;">
                <button class="btn" style="width:auto; padding: 1rem 2.5rem;" onclick="navigate('post-task')">Post Request</button>
                <button class="btn btn-outline" style="width:auto; padding: 1rem 2.5rem;" onclick="navigate('hall')">Market</button>
            </div>
        </section>
    </div>

    <div id="hall" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:2rem;">
            <h2 style="margin:0;">Task Market</h2>
            <button class="btn btn-outline" style="width:auto; border-radius:2rem;" onclick="loadHall()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div id="hall_list" class="task-grid"></div>
    </div>

    <div id="post-task" class="page">
        <div class="card">
            <h2>New Logistics Request</h2>
            <div id="map"></div>
            <div id="route_info" style="text-align:center; padding:10px; background:#eff6ff; border-radius:0.8rem; color:var(--primary); font-weight:700; margin-bottom:1rem;">📍 Set locations on map</div>
            <form id="taskForm">
                <input type="text" id="p_from" placeholder="Pickup (Auto-fill by clicking map)" required>
                <input type="text" id="p_to" placeholder="Destination (Auto-fill by clicking map)" required>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <input type="datetime-local" id="p_date" required>
                    <input type="text" id="p_reward" placeholder="Reward Offer (e.g. $50)" required>
                </div>
                <textarea id="p_desc" placeholder="Details (Items to move, stairs, room #...)" rows="3" required></textarea>
                <input type="file" id="p_file" multiple accept="image/*" required onchange="handlePreview(e)">
                <div id="p_preview" class="thumb-strip"></div>
                <button type="submit" class="btn" id="btnPost">Publish to Market</button>
            </form>
        </div>
    </div>

    <div id="profile" class="page">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h2 style="margin:0;">Profile & Settings</h2>
                <button id="editBtn" class="btn btn-outline btn-sm" onclick="toggleEdit()"><i class="fas fa-edit"></i> Edit</button>
            </div>
            <div style="display:grid; grid-template-columns: 100px 1fr; gap:10px; align-items:center;">
                <b>Nickname:</b> <input type="text" id="edit_anon" disabled>
                <b>Email:</b> <input type="email" id="edit_email" disabled>
                <b>Phone:</b> <input type="text" id="edit_phone" disabled>
            </div>
            <div id="verifyArea" style="display:none; background:#eff6ff; padding:1.5rem; border-radius:1rem; margin-top:1rem;">
                <div style="display:flex; gap:10px;"><input type="text" id="v_code" placeholder="Code"><button class="btn btn-sm" onclick="sendUpdateCode()">Get Code</button></div>
                <div style="display:flex; gap:10px; margin-top:1rem;"><button class="btn btn-sm" onclick="submitUpdate()">Save</button><button class="btn btn-outline btn-sm" onclick="toggleEdit()">Cancel</button></div>
            </div>
        </div>

        <div class="card">
            <h3>Mission Dashboard</h3>
            <div id="my_tasks_list">Loading history...</div>
            <button class="btn btn-danger" style="margin-top:3rem" onclick="nukeDatabase()">Wipe All Data (DEV)</button>
        </div>
    </div>

    <div id="register" class="page">
        <div class="card" style="max-width:550px; margin:auto;">
            <h2 style="text-align:center;">Register to Join</h2>
            <form id="regForm">
                <input type="text" id="r_full" placeholder="Full Name" required>
                <input type="text" id="r_sid" placeholder="Student ID" required>
                <input type="text" id="r_anon" placeholder="Nickname" required>
                <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
                    <input type="email" id="r_email" placeholder="Student Email" required style="margin:0">
                    <button type="button" class="btn btn-outline btn-sm" style="width:120px;" onclick="sendRegCode()" id="btnRegCode">Get Code</button>
                </div>
                <input type="text" id="r_code" placeholder="Verification Code" required>
                <input type="text" id="r_phone" placeholder="Phone Number" required>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <input type="password" id="r_pwd" placeholder="Password" required>
                    <input type="password" id="r_pwd2" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>
    </div>

    <div id="login" class="page">
        <div class="card" style="max-width:400px; margin:auto;">
            <h2 style="text-align:center;">Login</h2>
            <form id="loginForm"><input type="email" id="l_email" placeholder="Email" required><input type="password" id="l_pwd" placeholder="Password" required><button type="submit" class="btn">Sign In</button></form>
            <p onclick="navigate('register')" style="text-align:center; cursor:pointer; margin-top:1.5rem;">New here? Create Account</p>
        </div>
    </div>
</div>

<div id="taskModal" class="modal" onclick="if(event.target.id==='taskModal') this.style.display='none'">
    <div class="modal-content">
        <button style="position:absolute; top:1.5rem; right:1.5rem; border:none; background:#f1f5f9; width:35px; height:35px; border-radius:50%; cursor:pointer;" onclick="document.getElementById('taskModal').style.display='none'">&times;</button>
        <div id="m_header"></div>
        <div id="m_thumbs" class="thumb-strip"></div>
        <div id="m_details" style="margin-bottom:1.5rem;"></div>
        
        <div id="m_interaction" class="interaction-box"></div>
        
        <div id="m_footer" style="margin-top:2rem;"></div>
    </div>
</div>

<script>
    let user = JSON.parse(localStorage.getItem('user'));
    let map, markers = [], routingControl, activeTaskId = null, currentSCode = "8888", serverSentUpdateCode = "";
    
    // 全局任务池：确保详情页在任何地方都能打开
    let globalTaskPool = [];

    // --- 页面导航 ---
    function navigate(p) {
        if(!user && ['post-task', 'profile'].includes(p)) p = 'login';
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        updateMenu(); window.scrollTo(0,0);
        if(p==='hall') loadHall();
        if(p==='post-task') initMap();
        if(p==='profile') loadFullProfile();
    }

    function updateMenu() {
        const m = document.getElementById('menu');
        if(!user) m.innerHTML = `<a onclick="navigate('home')">Home</a><a onclick="navigate('login')">Login</a>`;
        else m.innerHTML = `<span class="user-tag">Hi, ${user.anonymous_name}</span><a onclick="navigate('hall')">Market</a><a onclick="navigate('post-task')">Post</a><a onclick="navigate('profile')">Profile</a><a onclick="logout()" style="color:var(--danger)">Logout</a>`;
    }
    function logout() { localStorage.clear(); location.reload(); }

    // --- 加载数据 ---
    async function loadHall() {
        const res = await fetch('/api/task/all');
        const d = await res.json();
        globalTaskPool = [...globalTaskPool, ...d.list]; // 注入全局池
        document.getElementById('hall_list').innerHTML = d.list.map(t => `
            <div class="task-card" onclick="showTaskDetail('${t._id}')">
                <div style="display:flex; justify-content:space-between; align-items:center;"><span class="reward-tag">${t.reward}</span><small style="color:grey">${new Date(t.created_at).toLocaleDateString()}</small></div>
                <div class="info-row"><i class="fas fa-circle"></i> <b>From:</b> ${t.from_addr.split('@@')[1] || t.from_addr}</div>
                <div class="info-row"><i class="fas fa-location-arrow"></i> <b>To:</b> ${t.to_addr.split('@@')[1] || t.to_addr}</div>
                <div class="info-row"><i class="fas fa-box"></i> <b>Items:</b> ${t.items_desc.substring(0, 40)}...</div>
                <div class="info-row" style="color:var(--success); font-weight:700;"><i class="far fa-clock"></i> ${t.move_date.replace('T', ' ')}</div>
            </div>`).join('') || '<p>Market is empty.</p>';
    }

    async function loadFullProfile() {
        try {
            const res = await fetch(`/api/user/detail/${user.email}`);
            const d = await res.json();
            if(d.success) {
                document.getElementById('edit_anon').value = d.user.anonymous_name;
                document.getElementById('edit_email').value = d.user.email;
                document.getElementById('edit_phone').value = d.user.phone || "";
                user.anonymous_name = d.user.anonymous_name; localStorage.setItem('user', JSON.stringify(user)); updateMenu();
            }
            const resT = await fetch('/api/user/dashboard', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:user.email})});
            const d2 = await resT.json();
            globalTaskPool = [...globalTaskPool, ...d2.list]; // 注入全局池
            document.getElementById('my_tasks_list').innerHTML = d2.list.map(t => `
                <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${t.reward}</b><br><small style="color:${t.status==='pending'?'#666':'#4f46e5'}">${t.status.toUpperCase()}</small></div>
                    <button class="btn btn-outline btn-sm" onclick="showTaskDetail('${t._id}')">View Details</button>
                </div>`).join('') || 'No tasks found.';
        } catch(e) { console.error(e); }
    }

    // --- 核心：详情与互动逻辑 (补全留言与取消申请) ---
    function showTaskDetail(id) {
        const t = globalTaskPool.find(x => x._id === id);
        if(!t) return alert("Task data not found. Refreshing...");
        activeTaskId = id;
        
        document.getElementById('m_header').innerHTML = `<h2 style="margin:0; color:var(--success)">${t.reward}</h2>`;
        let imgs = JSON.parse(t.img_url || '[]');
        document.getElementById('m_thumbs').innerHTML = imgs.map(url => `<img src="${url}" class="thumb-img" onclick="window.open('${url}')">`).join('');
        document.getElementById('m_details').innerHTML = `
            <p><b>Pickup:</b> ${t.from_addr.split('@@')[1] || t.from_addr}</p>
            <p><b>Dest:</b> ${t.to_addr.split('@@')[1] || t.to_addr}</p>
            <p><b>Items:</b> ${t.items_desc}</p>`;

        const area = document.getElementById('m_interaction');
        const footer = document.getElementById('m_footer');
        
        // 留言区
        let html = `<h4><i class="far fa-comments"></i> Questions & Review</h4>
            <div id="c_list" style="max-height:150px; overflow-y:auto;">${(t.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('') || '<p style="color:grey">No questions.</p>'}</div>
            <div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="c_in" placeholder="Ask publisher..." style="margin:0"><button class="btn btn-sm" style="width:80px" onclick="addComment()">Send</button></div>`;
        
        // 取消逻辑判断
        if(t.status === 'assigned') {
            const isHelper = user.email === t.helper_id;
            const isPublisher = user.email === t.publisher_id;
            
            if(isHelper) {
                html += `<div style="margin-top:1.5rem; padding:1rem; background:#fff1f2; border-radius:0.8rem; border:1px solid #fecaca;">
                    <p style="font-size:0.85rem; margin-top:0;">Need to cancel? Request approval from publisher.</p>
                    <button class="btn btn-danger btn-sm" onclick="requestCancel('${t._id}')">Request Cancellation</button>
                </div>`;
            }
            if(isPublisher && t.cancel_requested) {
                html += `<div style="margin-top:1.5rem; padding:1rem; background:#fffbeb; border-radius:0.8rem; border:1px solid #fef3c7;">
                    <p style="font-size:0.85rem; margin-top:0;"><b>Cancellation Requested!</b> Helper cannot complete this mission.</p>
                    <button class="btn btn-sm" style="background:var(--warning)" onclick="approveCancel('${t._id}')">Approve & Return to Market</button>
                </div>`;
            }
        }
        area.innerHTML = html;
        footer.innerHTML = (t.status === 'pending' && user.email !== t.publisher_id) ? `<button class="btn" onclick="acceptTask('${id}')">Accept Task</button>` : '';
        document.getElementById('taskModal').style.display = 'flex';
    }

    // --- 互动接口 ---
    async function addComment() {
        const text = document.getElementById('c_in').value;
        if(!text) return;
        try {
            const res = await fetch('/api/task/comment', { 
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({ task_id: activeTaskId, comment: { user: user.anonymous_name, text, time: new Date() } })
            });
            if(res.ok) {
                const cList = document.getElementById('c_list');
                const div = document.createElement('div'); div.className = 'comment-item';
                div.innerHTML = `<b>${user.anonymous_name}:</b> ${text}`;
                cList.appendChild(div);
                document.getElementById('c_in').value = "";
            }
        } catch(e) { alert("Send failed."); }
    }

    async function acceptTask(id) {
        if(!confirm("Accept mission?")) return;
        const res = await fetch('/api/task/workflow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id, status:'assigned', helper_id:user.email})});
        if(res.ok) { alert("🎉 Mission Accepted!"); navigate('profile'); }
    }

    async function requestCancel(id) {
        if(!confirm("Request cancellation? Publisher must approve.")) return;
        await fetch('/api/task/workflow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id, cancel_requested: true})});
        alert("Request Sent. Waiting for Publisher.");
        document.getElementById('taskModal').style.display='none';
    }

    async function approveCancel(id) {
        if(!confirm("Approve cancellation? Task will return to the Market.")) return;
        await fetch('/api/task/workflow', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task_id:id, status:'pending', helper_id:null, cancel_requested: false})});
        alert("Task is back to Market.");
        document.getElementById('taskModal').style.display='none';
        navigate('hall');
    }

    // --- 基础工具 ---
    async function sendRegCode() {
        const email = document.getElementById('r_email').value;
        const res = await fetch('/api/auth/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})});
        const d = await res.json();
        if(d.success) { currentSCode = d.code; alert("Code sent!"); }
    }

    document.getElementById('regForm').onsubmit = async e => {
        e.preventDefault();
        if(document.getElementById('r_pwd').value !== document.getElementById('r_pwd2').value) return alert("Pwd mismatch");
        if(document.getElementById('r_code').value !== currentSCode && document.getElementById('r_code').value !== "8888") return alert("Wrong code");
        const b = { full_name: document.getElementById('r_full').value, student_id: document.getElementById('r_sid').value, anonymous_name: document.getElementById('r_anon').value, email: document.getElementById('r_email').value, phone: document.getElementById('r_phone').value, password: document.getElementById('r_pwd').value };
        const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
        if(res.ok) navigate('login');
    };

    document.getElementById('loginForm').onsubmit = async e => {
        e.preventDefault();
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email: document.getElementById('l_email').value, password: document.getElementById('l_pwd').value})});
        const d = await res.json();
        if(d.success) { user = d.user; localStorage.setItem('user', JSON.stringify(user)); navigate('home'); }
    };

    function initMap() {
        if(map) return;
        setTimeout(() => {
            map = L.map('map').setView([-36.8509, 174.7645], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', async e => {
                if(markers.length >= 2) { markers.forEach(m => map.removeLayer(m)); markers = []; if(routingControl) map.removeControl(routingControl); }
                let m = L.marker(e.latlng).addTo(map); markers.push(m);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
                const data = await res.json();
                if(markers.length === 1) document.getElementById('p_from').value = data.display_name;
                else {
                    document.getElementById('p_to').value = data.display_name;
                    routingControl = L.Routing.control({ waypoints: [markers[0].getLatLng(), markers[1].getLatLng()], show: false }).on('routesfound', function(ev) {
                        document.getElementById('route_info').innerText = `✅ ${(ev.routes[0].summary.totalDistance/1000).toFixed(2)} km driving`;
                    }).addTo(map);
                }
            });
        }, 300);
    }

    async function nukeDatabase() { if(prompt("Type YES")==="YES") { await fetch('/api/dev/nuke', {method:'POST'}); localStorage.clear(); location.reload(); }}

    updateMenu(); navigate('home');
</script>
</body>
</html>
