<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormLift Pro | UoA Campus Life</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        /* =============================================================
           1. 基础与背景样式 (极简 UI)
        ============================================================= */
        :root {
            --primary: #6344F5; --primary-gradient: linear-gradient(135deg, #6344F5 0%, #8E77FF 100%);
            --success: #059669; --warning: #f59e0b; --danger: #dc2626; --medal: #d97706; --team: #ec4899; 
            --dark: #0f172a; --text: #334155; --muted: #64748b;
            --bg: #ffffff; --card-bg: rgba(255, 255, 255, 0.7);
            --radius-lg: 1.25rem; --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        * { box-sizing: border-box; }

        .bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .lang-node { position: absolute; font-weight: 900; color: rgba(99, 68, 245, 0.04); animation: safeFloat 20s infinite ease-in-out; }
        @keyframes safeFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(2vw, -2vh); } }

        /* =============================================================
           2. 导航与侧边栏
        ============================================================= */
        nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #f0f0f0; }
        .user-avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(99, 68, 245, 0.3); }

        .profile-drawer { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.05); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 50px 30px; overflow-y: auto; }
        .profile-drawer.open { right: 0; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .profile-stats { display: flex; justify-content: space-around; margin-top: 20px; font-size: 0.9rem; text-align: center; background: #f8fafc; padding: 15px; border-radius: 16px; }
        .kb-mini-item { background: #f8fafc; border-left: 3px solid var(--primary); padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem; cursor:pointer;}

        /* =============================================================
           3. 主内容区与信息流
        ============================================================= */
        .container { max-width: 800px; margin: 0 auto; padding: 120px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 4rem; font-weight: 900; letter-spacing: -3px; text-align: center; margin-bottom: 40px; color: var(--dark); line-height: 1.1; }
        .gradient-text { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .post-box { width: 100%; background: white; border-radius: 30px; padding: 15px 25px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eef2f6; margin-bottom: 30px; cursor: pointer; transition: 0.3s; }
        .post-box:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(99, 68, 245, 0.1); border-color: var(--primary); }
        .post-box input { flex: 1; border: none; outline: none; font-size: 1.1rem; padding: 10px; cursor: pointer; background: transparent; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .feed-section { width: 100%; margin-top: 20px; }
        .feed-filter { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .filter-tag { padding: 8px 18px; border-radius: 20px; background: #f8fafc; border: 1px solid #eef2f6; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: 0.3s; color: var(--muted); }
        .filter-tag.active { background: var(--primary-gradient); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(99,68,245,0.3); }

        .market-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eef2f6; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; margin-bottom: 20px; animation: slideUp 0.4s ease-out; }
        .market-card:hover { transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .m-img { width: 100%; height: 250px; object-fit: cover; background: #f8fafc; border-bottom: 1px solid #eef2f6; }
        .m-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .team-card { border-top: 4px solid var(--team); }
        .team-progress-bg { width: 100%; height: 10px; background: #e2e8f0; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .team-progress-fill { height: 100%; background: linear-gradient(90deg, #ec4899, #f43f5e); transition: width 0.5s ease; }
        
        .hub-row { display: grid; grid-template-columns: 100px 1fr 130px; align-items: center; background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid #eef2f6; cursor: pointer; margin-bottom: 20px; animation: slideUp 0.4s ease-out; box-shadow: var(--shadow-sm); }
        .posted-col { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; border-right: 2px solid #f1f5f9; }
        .details-strip { padding: 0 2rem; display: flex; flex-direction: column; gap: 8px; }
        .reward-col { font-size: 1.5rem; font-weight: 900; color: var(--primary); text-align: right; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* =============================================================
           4. 弹窗与表单 (Auth & Posts)
        ============================================================= */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: white; width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto; border-radius: 2rem; padding: 2.5rem; position: relative; }
        
        .tab-container { display: flex; gap: 1rem; margin-bottom: 2rem; background: #f8fafc; padding: 0.5rem; border-radius: 1rem; overflow-x: auto; scrollbar-width: none; border: 1px solid #eef2f6; }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 1; padding: 1rem; text-align: center; font-weight: 800; font-size: 1rem; border-radius: 0.8rem; cursor: pointer; transition: 0.3s; color: var(--muted); border: none; background: transparent; white-space: nowrap; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: var(--shadow-sm); }
        .tab-content { display: none !important; } .tab-content.active { display: block !important; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; color: var(--dark); }
        input[type="text"], input[type="number"], input[type="datetime-local"], input[type="date"], input[type="password"], input[type="email"], select, textarea { width: 100%; padding: 1rem; background: #f8fafc; border: 1px solid #eef2f6; border-radius: 12px; font-family: inherit; font-size: 1rem; transition: 0.2s; box-sizing: border-box; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; background: white; box-shadow: 0 0 0 4px rgba(99,68,245,0.1); }
        
        .btn { background: var(--primary-gradient); color: white; padding: 1rem 2rem; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(99,68,245,0.4); }
        
        .map-container { height: 300px; width: 100%; border-radius: 1.5rem; z-index: 10; margin-bottom: 1rem; border: 2px solid #eef2f6; }
        #modal-map { height: 280px; border-radius: 1.5rem; border: 2px solid #eef2f6; z-index: 10; margin-bottom: 1.5rem; display: none; }
        .custom-pin { background: transparent; border: none; } 
        .pin-wrapper { background: white; border: 2.5px solid var(--primary); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="bg-canvas">
        <span class="lang-node" style="top:10%; left:5%; font-size:6rem;">Kia Ora</span>
        <span class="lang-node" style="top:20%; right:10%; font-size:5rem;">Bula</span>
        <span class="lang-node" style="bottom:15%; left:10%; font-size:5.5rem;">Auckland</span>
    </div>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem; cursor: pointer;" onclick="location.reload()">DL<span style="color:var(--primary)">.</span></div>
        <div class="user-avatar" id="navAvatar" onclick="handleAvatarClick()"><i class="fas fa-user"></i></div>
    </nav>

    <div class="profile-drawer" id="profileDrawer">
        <button style="border:none; background:none; font-size:1.8rem; cursor:pointer; position:absolute; right:20px; top:20px; color:var(--muted);" onclick="toggleProfile()">×</button>
        <div class="profile-header" style="margin-top: 20px;">
            <div class="user-avatar" id="profAvatar" style="width:80px; height:80px; margin: 0 auto 15px; font-size: 2rem;">U</div>
            <h3 style="margin: 0 0 5px 0;" id="prof_name">Student</h3>
            <p style="color:var(--muted); font-size:0.9rem; margin:0;" id="prof_id">ID: N/A</p>
        </div>
        
        <div class="profile-stats">
            <div><b style="font-size:1.2rem; color:var(--medal);" id="prof_pts">0</b><br><span style="color:var(--muted);">Medals</span></div>
            <div><b style="font-size:1.2rem; color:var(--warning);" id="prof_rating">5.0</b><br><span style="color:var(--muted);">信用分</span></div>
        </div>

        <div style="margin-top:40px;">
            <p style="font-weight:800; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px;">Ongoing Tasks (看板)</p>
            <div id="prof_kanban_list">
                <p style="color:var(--muted); font-size:0.85rem; text-align:center;">Loading active tasks...</p>
            </div>
            <button class="btn" style="width:100%; margin-top:20px; background:#f1f5f9; color:var(--dark);" onclick="logout()">Log Out</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Campus Life,<br><span class="gradient-text">Whanaungatanga.</span></h1>
        </header>

        <div class="post-box" onclick="openPostModal()">
            <input type="text" readonly placeholder="在此输入：需要搬家？寻找拼房？二手交易？" style="pointer-events:none;">
            <button class="btn-send"><i class="fas fa-paper-plane"></i> 发布</button>
        </div>

        <div class="feed-section">
            <div class="feed-filter">
                <div class="filter-tag active" onclick="filterFeed('all')">全部动态</div>
                <div class="filter-tag" onclick="filterFeed('market')">🛍️ 闲置 Market</div>
                <div class="filter-tag" onclick="filterFeed('teamup')">🤝 组局 Team-Up</div>
                <div class="filter-tag" onclick="filterFeed('flatting')">🏠 租房 Flatting</div>
                <div class="filter-tag" onclick="filterFeed('logistics')">🚚 物流 Logistics</div>
            </div>
            <div id="feedContent"><p style="text-align:center; padding:3rem; color:var(--muted);">Loading campus buzz...</p></div>
        </div>
    </div>

    <div id="authModal" class="modal" onclick="if(event.target.id==='authModal') this.style.display='none'">
        <div class="modal-content" style="max-width: 450px;">
            <h2 style="margin-top:0; text-align:center;">Portal Access</h2>
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchAuth('login')" id="btn_auth_login">Login</button>
                <button class="tab-btn" onclick="switchAuth('register')" id="btn_auth_register">Register</button>
            </div>
            <div id="auth_login" class="tab-content active">
                <form onsubmit="submitLogin(event)">
                    <label>Email or Student ID</label><input type="text" id="l_email" required>
                    <label style="margin-top:10px;">Password</label><input type="password" id="l_pwd" required>
                    <button type="submit" class="btn" style="width:100%; margin-top:20px;">Access Hub</button>
                </form>
            </div>
            <div id="auth_register" class="tab-content">
                <form onsubmit="submitRegister(event)">
                    <div class="form-grid" style="gap:10px; margin-bottom:10px;"><div><input type="text" id="r_sid" placeholder="Student ID" required></div><div><input type="text" id="r_anon" placeholder="Nickname" required></div></div>
                    <div class="form-grid" style="gap:10px; margin-bottom:10px;"><div><input type="text" id="r_fn" placeholder="First Name" required></div><div><input type="text" id="r_gn" placeholder="Given Name" required></div></div>
                    <input type="email" id="r_email" placeholder="Email" style="margin-bottom:10px;" required>
                    <input type="text" id="r_phone" placeholder="Phone" style="margin-bottom:10px;" required>
                    <div class="form-grid" style="gap:10px; margin-bottom:10px;"><div><input type="text" id="r_code" placeholder="Code (e.g. 8888)" required></div><div><button type="button" class="btn" style="padding:1rem;" onclick="sendCode()">Get Code</button></div></div>
                    <input type="password" id="r_pwd" placeholder="Password" required>
                    <button type="submit" class="btn" style="width:100%; margin-top:20px;">Register & Join</button>
                </form>
            </div>
        </div>
    </div>

    <div id="postModal" class="modal" onclick="if(event.target.id==='postModal') closePostModal()">
        <div class="modal-content">
            <button style="position:absolute; top:1.5rem; right:2rem; border:none; background:#f1f5f9; width:40px; height:40px; border-radius:50%; font-size:1.2rem; cursor:pointer; z-index: 100;" onclick="closePostModal()">×</button>
            <h2 style="margin-top:0; font-size:2rem;">Publish to Network</h2>
            
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchPost('market')" id="btn_post_market">Sell Item</button>
                <button class="tab-btn" onclick="switchPost('flatting')" id="btn_post_flatting">Flatting</button>
                <button class="tab-btn" onclick="switchPost('teamup')" id="btn_post_teamup">Team-Up</button>
                <button class="tab-btn" onclick="switchPost('logistics')" id="btn_post_logistics">Logistics</button>
            </div>

            <div id="post_market" class="tab-content active">
                <form onsubmit="submitPost(event, 'market')">
                    <div class="form-grid"><div><label>Item Title</label><input type="text" id="m_title" required></div><div><label>Price (NZD)</label><input type="number" id="m_price" required></div></div>
                    <div class="form-grid"><div><label>Condition</label><select id="m_cond"><option>Brand New</option><option>Like New</option><option>Good</option></select></div><div><label>Pickup Location</label><input type="text" id="m_loc" required></div></div>
                    <label>Description</label><textarea id="m_desc" rows="3" required></textarea>
                    <label>Photos</label><input type="file" id="m_file" multiple accept="image/*">
                    <button type="submit" class="btn" style="width:100%; margin-top:1rem;">List Item</button>
                </form>
            </div>

            <div id="post_flatting" class="tab-content">
                <div id="map_flat" class="map-container"></div>
                <p style="font-size:0.85rem; color:var(--warning); font-weight:700; margin-top:-10px; margin-bottom:15px;"><i class="fas fa-map-pin"></i> 坐标: <span id="flat_coord_val">点击地图拾取</span></p>
                <form onsubmit="submitPost(event, 'flatting')">
                    <div class="form-grid"><div><label>Listing Title</label><input type="text" id="fl_title" required></div><div><label>Rent/Week (NZD)</label><input type="number" id="fl_price" required></div></div>
                    <div class="form-grid"><div><label>Room Type</label><select id="fl_type"><option>Single Room</option><option>Double Room</option><option>Studio</option></select></div><div><label>Address</label><input type="text" id="fl_loc" required></div></div>
                    <label>Photos</label><input type="file" id="fl_file" multiple accept="image/*">
                    <button type="submit" class="btn" style="width:100%; background:var(--warning); margin-top:1rem;">Publish Housing</button>
                </form>
            </div>

            <div id="post_teamup" class="tab-content">
                <form onsubmit="submitPost(event, 'teamup')">
                    <div class="form-grid"><div><label>Event Title</label><input type="text" id="tu_title" required></div><div><label>Category</label><select id="tu_cat"><option>Carpool</option><option>GroupBuy</option><option>Study</option><option>Social</option></select></div></div>
                    <div class="form-grid"><div><label>Est. Cost</label><input type="text" id="tu_cost" placeholder="e.g. $15 或 AA" required></div><div><label>Location</label><input type="text" id="tu_loc" required></div></div>
                    <div class="form-grid"><div><label>Min/Max Members</label><div style="display:flex; gap:10px;"><input type="number" id="tu_min" placeholder="Min" required><input type="number" id="tu_max" placeholder="Max" required></div></div><div><label>Meeting Time</label><input type="datetime-local" id="tu_time" required></div></div>
                    <label>Min Credit Requirement</label><select id="tu_credit"><option value="0">0 (No Limit)</option><option value="4.0">4.0+ Stars</option><option value="4.5">4.5+ Stars</option></select>
                    <label style="margin-top:10px;">Description</label><textarea id="tu_desc" rows="2" required></textarea>
                    <button type="submit" class="btn" style="width:100%; background:var(--team); margin-top:1rem;">Initiate Team-Up</button>
                </form>
            </div>

            <div id="post_logistics" class="tab-content">
                <div id="map" class="map-container"></div>
                <form onsubmit="submitPost(event, 'task')">
                    <div class="form-grid"><div><label>Pickup</label><input type="text" id="p_from" readonly required placeholder="Click map to set"></div><div><label>Destination</label><input type="text" id="p_to" readonly required placeholder="Click map to set"></div></div>
                    <div class="form-grid"><div><label>Reward (NZD)</label><input type="number" id="p_reward" required></div><div><label>Date & Time</label><input type="datetime-local" id="p_date" required></div></div>
                    <label>Description</label><textarea id="p_desc" rows="2" required></textarea>
                    <label>Task Scale</label><select id="p_scale"><option>Small</option><option>Medium</option><option>Large</option></select>
                    <button type="submit" class="btn" style="width:100%; margin-top:1rem;">Broadcast Logistics Task</button>
                </form>
            </div>
        </div>
    </div>

    <div id="masterModal" class="modal" onclick="if(event.target.id==='masterModal') this.style.display='none'">
        <div class="modal-content" style="max-width: 700px;">
            <button style="position:absolute; top:2rem; right:2.5rem; border:none; background:#f1f5f9; width:45px; height:45px; border-radius:50%; font-size:1.5rem; cursor:pointer;" onclick="document.getElementById('masterModal').style.display='none'">×</button>
            <div id="mod_header" style="margin-bottom:1.5rem;"></div>
            <div id="mod_body" style="background:#f8fafc; padding:2rem; border-radius:1.5rem; border:1px solid #eef2f6;"></div>
            <div id="mod_footer" style="margin-top:2rem; display:flex; gap:15px;"></div>
        </div>
    </div>

    <script>
        // ======================= STATE & AUTH =======================
        let user = JSON.parse(localStorage.getItem('dl_user'));
        let state = { log: [], mar: [], flat: [], team: [] };
        let activeFilter = 'all';
        let map, mapFlat, markerFlat, markers = [];

        function checkAuth() {
            if(user) {
                document.getElementById('navAvatar').innerText = user.anonymous_name.charAt(0).toUpperCase();
            } else {
                document.getElementById('navAvatar').innerHTML = '<i class="fas fa-lock"></i>';
            }
        }

        function handleAvatarClick() {
            if(user) {
                toggleProfile();
                loadProfileData();
            } else {
                document.getElementById('authModal').style.display = 'flex';
            }
        }

        function switchAuth(tab) {
            document.getElementById('btn_auth_login').classList.toggle('active', tab==='login');
            document.getElementById('btn_auth_register').classList.toggle('active', tab==='register');
            document.getElementById('auth_login').classList.toggle('active', tab==='login');
            document.getElementById('auth_register').classList.toggle('active', tab==='register');
        }

        async function submitLogin(e) {
            e.preventDefault();
            const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email: document.getElementById('l_email').value, password: document.getElementById('l_pwd').value})});
            const d = await res.json();
            if(d.success) { user = d.user; localStorage.setItem('dl_user', JSON.stringify(user)); document.getElementById('authModal').style.display='none'; checkAuth(); alert("Login Success!"); }
            else alert(d.msg || "Login failed");
        }

        async function submitRegister(e) {
            e.preventDefault();
            const body = { student_id: document.getElementById('r_sid').value, anonymous_name: document.getElementById('r_anon').value, first_name: document.getElementById('r_fn').value, given_name: document.getElementById('r_gn').value, email: document.getElementById('r_email').value, phone: document.getElementById('r_phone').value, code: document.getElementById('r_code').value, password: document.getElementById('r_pwd').value };
            const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
            const d = await res.json();
            if(d.success) { alert("Registration verified! Please login."); switchAuth('login'); }
            else alert(d.msg || "Registration failed");
        }
        async function sendCode() {
            const email = document.getElementById('r_email').value; if(!email) return alert("Email required");
            await fetch('/api/auth/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})}); alert("Code dispatched.");
        }
        function logout() { localStorage.removeItem('dl_user'); user = null; location.reload(); }

        // ======================= FEED & API DATA =======================
        async function loadFeedData() {
            try {
                const [resL, resM, resF, resT] = await Promise.all([fetch('/api/task/all'), fetch('/api/market/all'), fetch('/api/flatting/all'), fetch('/api/teamup/all')]);
                const [dlog, dmar, dflat, dteam] = await Promise.all([resL.json(), resM.json(), resF.json(), resT.json()]);
                state.log = dlog.list || []; state.mar = dmar.list || []; state.flat = dflat.list || []; state.team = dteam.list || [];
                renderFeed();
            } catch (e) { document.getElementById('feedContent').innerHTML = "<p style='text-align:center;'>Database offline or sleeping.</p>"; }
        }

        function filterFeed(type) {
            activeFilter = type;
            document.querySelectorAll('.filter-tag').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            renderFeed();
        }

        function renderFeed() {
            const container = document.getElementById('feedContent');
            let combined = [];
            if(activeFilter === 'all' || activeFilter === 'market') combined.push(...state.mar.map(x=>({...x, _feedType:'market'})));
            if(activeFilter === 'all' || activeFilter === 'teamup') combined.push(...state.team.map(x=>({...x, _feedType:'teamup'})));
            if(activeFilter === 'all' || activeFilter === 'flatting') combined.push(...state.flat.map(x=>({...x, _feedType:'flatting'})));
            if(activeFilter === 'all' || activeFilter === 'logistics') combined.push(...state.log.map(x=>({...x, _feedType:'logistics'})));
            
            combined.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if(combined.length === 0) { container.innerHTML = '<p style="text-align:center; padding:3rem; color:var(--muted);">No active campus buzz here yet.</p>'; return; }

            container.innerHTML = combined.map(item => {
                let imgArr = []; try { imgArr = JSON.parse(item.img_url); } catch(e){}
                const displayImg = imgArr[0] || 'https://via.placeholder.com/400x200?text=No+Image';

                if(item._feedType === 'market') {
                    return `<div class="market-card" onclick="openMasterModal('mar', '${item._id}')"><img src="${displayImg}" class="m-img"><div class="m-body"><div><h3 style="margin:0 0 5px 0;">${item.title}</h3><div style="font-size:0.8rem; margin-bottom:10px;"><span style="background:#f1f5f9; padding:2px 8px; border-radius:4px; font-weight:700;">${item.condition}</span> <span style="color:var(--muted);"><i class="fas fa-user-circle"></i> ${item.seller_name}</span></div></div><div><div style="font-size:1.5rem; font-weight:900; color:var(--dark);">$${item.price}</div></div></div></div>`;
                } else if (item._feedType === 'flatting') {
                    return `<div class="market-card" style="border-top:4px solid var(--warning);" onclick="openMasterModal('flat', '${item._id}')"><img src="${displayImg}" class="m-img" style="height:200px;"><div class="m-body"><div><div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span style="background:#fef3c7; color:var(--medal); padding:2px 8px; border-radius:4px; font-size:0.75rem; font-weight:800;">Verified</span></div><h3 style="margin:0 0 5px 0;">${item.title}</h3><div style="font-size:0.85rem; color:var(--muted);"><i class="fas fa-map-marker-alt"></i> ${item.location}</div></div><div style="font-size:1.4rem; font-weight:900; margin-top:10px;">$${item.rent_price}<span style="font-size:0.9rem; color:var(--muted);">/w</span></div></div></div>`;
                } else if (item._feedType === 'teamup') {
                    const pct = (item.joined_members.length / item.max_members) * 100;
                    return `<div class="market-card team-card" onclick="openMasterModal('team', '${item._id}')"><div class="m-body"><div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span style="background:#fce7f3; color:var(--team); padding:4px 8px; border-radius:6px; font-weight:800; font-size:0.75rem;">${item.category}</span><span style="font-weight:900; color:var(--dark);">${item.estimated_cost}</span></div><h3 style="margin:0 0 5px 0;">${item.title}</h3><div style="font-size:0.85rem; color:var(--muted); margin-bottom:10px;"><i class="fas fa-map-marker-alt"></i> ${item.location}</div><div class="team-progress-bg"><div class="team-progress-fill" style="width:${pct}%;"></div></div><div style="font-size:0.8rem; font-weight:700;">${item.joined_members.length}/${item.max_members} Joined</div></div></div>`;
                } else if (item._feedType === 'logistics') {
                    const fA = item.from_addr.includes('@@') ? item.from_addr.split('@@')[1] : item.from_addr;
                    const tA = item.to_addr.includes('@@') ? item.to_addr.split('@@')[1] : item.to_addr;
                    return `<div class="hub-row" onclick="openMasterModal('log', '${item._id}')"><div class="posted-col"><i class="fas fa-user-circle"></i> ${item.publisher_name}</div><div class="details-strip"><div style="font-weight:800; font-size:0.9rem;">${fA} <i class="fas fa-arrow-right" style="color:var(--muted); font-size:0.8rem;"></i> ${tA}</div><div style="font-size:0.85rem; color:var(--muted);">${item.items_desc}</div></div><div class="reward-col">$${item.reward}</div></div>`;
                }
            }).join('');
        }

        // ======================= POSTING DATA =======================
        function openPostModal() {
            if(!user) return handleAvatarClick();
            document.getElementById('postModal').style.display = 'flex';
            setTimeout(() => { if(!mapFlat) initFlatMap(); else mapFlat.invalidateSize(); }, 300);
        }
        function closePostModal() { document.getElementById('postModal').style.display = 'none'; }
        
        function switchPost(tab) {
            ['market', 'flatting', 'teamup', 'logistics'].forEach(t => {
                document.getElementById(`btn_post_${t}`).classList.toggle('active', t === tab);
                document.getElementById(`post_${t}`).classList.toggle('active', t === tab);
            });
            if(tab === 'logistics') setTimeout(() => { if(!map) initMap(); else map.invalidateSize(); }, 200);
            if(tab === 'flatting') setTimeout(() => { if(mapFlat) mapFlat.invalidateSize(); }, 200);
        }

        async function submitPost(e, type) {
            e.preventDefault();
            const f = new FormData();
            
            // Backend Schema Mapping based on V12.1 index.js
            if(type === 'market') {
                f.append('seller_id', user.email); f.append('seller_name', user.anonymous_name);
                f.append('title', document.getElementById('m_title').value); f.append('price', document.getElementById('m_price').value);
                f.append('condition', document.getElementById('m_cond').value); f.append('location', document.getElementById('m_loc').value);
                f.append('description', document.getElementById('m_desc').value);
                if(document.getElementById('m_file').files) Array.from(document.getElementById('m_file').files).forEach(x=>f.append('images', x));
            } else if(type === 'flatting') {
                f.append('publisher_id', user.email); f.append('publisher_name', user.anonymous_name);
                f.append('title', document.getElementById('fl_title').value); f.append('rent_price', document.getElementById('fl_price').value);
                f.append('room_type', document.getElementById('fl_type').value); f.append('location', document.getElementById('fl_loc').value);
                f.append('description', 'Housing post'); f.append('available_date', new Date().toISOString());
                if(markerFlat) f.append('coords', `${markerFlat.getLatLng().lat},${markerFlat.getLatLng().lng}`);
                if(document.getElementById('fl_file').files) Array.from(document.getElementById('fl_file').files).forEach(x=>f.append('images', x));
            } else if(type === 'teamup') {
                f.append('initiator_id', user.email); f.append('initiator_name', user.anonymous_name);
                f.append('title', document.getElementById('tu_title').value); f.append('category', document.getElementById('tu_cat').value);
                f.append('estimated_cost', document.getElementById('tu_cost').value); f.append('location', document.getElementById('tu_loc').value);
                f.append('min_members', document.getElementById('tu_min').value); f.append('max_members', document.getElementById('tu_max').value);
                f.append('meet_time', document.getElementById('tu_time').value); f.append('min_credit_req', document.getElementById('tu_credit').value);
                f.append('description', document.getElementById('tu_desc').value);
                f.append('joined_members', JSON.stringify([{email: user.email, name: user.anonymous_name}])); // Array init
            } else if(type === 'task') {
                if(markers.length < 2) return alert("Please select Pickup & Dropoff on map.");
                f.append('publisher_id', user.email); f.append('publisher_name', user.anonymous_name);
                f.append('from_addr', `${markers[0].getLatLng().lat},${markers[0].getLatLng().lng}@@${document.getElementById('p_from').value}`);
                f.append('to_addr', `${markers[1].getLatLng().lat},${markers[1].getLatLng().lng}@@${document.getElementById('p_to').value}`);
                f.append('reward', document.getElementById('p_reward').value); f.append('move_date', document.getElementById('p_date').value);
                f.append('items_desc', document.getElementById('p_desc').value); f.append('task_scale', document.getElementById('p_scale').value);
            }

            const ep = type === 'task' ? '/api/task/create' : `/api/${type}/create`;
            const res = await fetch(ep, { method: 'POST', body: f });
            const d = await res.json();
            if(d.success) { alert("Successfully published!"); closePostModal(); loadFeedData(); }
            else alert("Publish failed: " + (d.msg || "Server Error"));
        }

        // ======================= INTERACTION MODALS =======================
        function openMasterModal(type, id) {
            const h = document.getElementById('mod_header'); const b = document.getElementById('mod_body'); const f = document.getElementById('mod_footer');
            let item, displayImg = '';
            
            if(type === 'mar') {
                item = state.mar.find(x=>x._id===id);
                try { displayImg = JSON.parse(item.img_url)[0]; } catch(e){}
                h.innerHTML = `<h2 style="margin:0; color:var(--dark); font-size:2.2rem;">$${item.price}</h2>`;
                b.innerHTML = (displayImg ? `<img src="${displayImg}" style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:15px;">` : '') + `<h3 style="margin:0 0 10px 0;">${item.title}</h3><p><b>Condition:</b> ${item.condition}</p><p><b>Location:</b> ${item.location}</p><p>${item.description}</p><hr style="border:0; border-top:1px dashed #eef2f6;"><p><i class="fas fa-user-circle"></i> Seller: ${item.seller_name}</p>`;
                f.innerHTML = `<button class="btn" style="width:100%; background:var(--success);" onclick="triggerWorkflow('mar', '${id}', 'reserved')">Reserve Item</button>`;
            } else if (type === 'flat') {
                item = state.flat.find(x=>x._id===id);
                try { displayImg = JSON.parse(item.img_url)[0]; } catch(e){}
                h.innerHTML = `<h2 style="margin:0; color:var(--warning); font-size:2.2rem;">$${item.rent_price}/w</h2>`;
                b.innerHTML = (displayImg ? `<img src="${displayImg}" style="width:100%; height:200px; object-fit:cover; border-radius:12px; margin-bottom:15px;">` : '') + `<h3 style="margin:0 0 10px 0;">${item.title}</h3><p><b>Type:</b> ${item.room_type}</p><p><b>Location:</b> ${item.location}</p><hr style="border:0; border-top:1px dashed #eef2f6;"><p><i class="fas fa-shield-check" style="color:var(--success);"></i> Publisher: ${item.publisher_name}</p>`;
                f.innerHTML = `<button class="btn" style="width:100%; background:var(--warning);">Contact Publisher</button>`;
            } else if (type === 'team') {
                item = state.team.find(x=>x._id===id);
                h.innerHTML = `<h2 style="margin:0; color:var(--team); font-size:2.2rem;">${item.title}</h2>`;
                b.innerHTML = `<p><b>Category:</b> ${item.category} | <b>Cost:</b> ${item.estimated_cost}</p><p><b>Time:</b> ${new Date(item.meet_time).toLocaleString()}</p><p><b>Location:</b> ${item.location}</p><p>${item.description}</p><div style="background:#f1f5f9; padding:10px; border-radius:8px; margin-top:10px;"><b>Joined:</b> ${item.joined_members.map(m=>m.name).join(', ')}</div>`;
                f.innerHTML = `<button class="btn" style="width:100%; background:var(--team);" onclick="joinTeamUp('${id}')">Join Team (${item.joined_members.length}/${item.max_members})</button>`;
            } else if (type === 'log') {
                item = state.log.find(x=>x._id===id);
                h.innerHTML = `<h2 style="margin:0; color:var(--primary); font-size:2.2rem;">$${item.reward}</h2>`;
                b.innerHTML = `<p><b>From:</b> ${item.from_addr.split('@@')[1]}</p><p><b>To:</b> ${item.to_addr.split('@@')[1]}</p><p><b>Details:</b> ${item.items_desc}</p><p><b>Medals:</b> ${item.medal_points} Pts</p><hr style="border:0; border-top:1px dashed #eef2f6;"><p><i class="fas fa-user-circle"></i> Peer: ${item.publisher_name}</p>`;
                f.innerHTML = `<button class="btn" style="width:100%;" onclick="triggerWorkflow('log', '${id}', 'assigned')">Accept Delivery Task</button>`;
            }
            document.getElementById('masterModal').style.display = 'flex';
        }

        async function triggerWorkflow(type, id, status) {
            if(!user) return alert("Please login first.");
            const ep = type === 'log' ? '/api/task/workflow' : '/api/market/workflow';
            const body = type === 'log' ? { task_id: id, status, helper_id: user.email } : { item_id: id, status, buyer_id: user.email };
            const res = await fetch(ep, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            const d = await res.json();
            if(d.success) { alert("Action Confirmed!"); document.getElementById('masterModal').style.display='none'; loadFeedData(); }
            else alert(d.msg || "Action Failed. (Check Credit Score requirement?)");
        }

        async function joinTeamUp(id) {
            if(!user) return alert("Please login first.");
            const res = await fetch('/api/teamup/join', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ team_id: id, email: user.email, name: user.anonymous_name }) });
            const d = await res.json();
            if(d.success) { alert("Joined Team Successfully!"); document.getElementById('masterModal').style.display='none'; loadFeedData(); }
            else alert(d.msg || "Cannot join team.");
        }

        // ======================= PROFILE =======================
        function toggleProfile() { document.getElementById('profileDrawer').classList.toggle('open'); }
        async function loadProfileData() {
            if(!user) return;
            try {
                const res = await fetch(`/api/user/detail/${user.email}`);
                const d = await res.json();
                if(d.success) {
                    const u = d.user;
                    document.getElementById('prof_name').innerText = u.anonymous_name;
                    document.getElementById('prof_id').innerText = `ID: ${u.student_id}`;
                    document.getElementById('profAvatar').innerText = u.anonymous_name.charAt(0).toUpperCase();
                    document.getElementById('prof_pts').innerText = u.medal_points || 0;
                    document.getElementById('prof_rating').innerText = (u.rating_avg || 5.0).toFixed(1);

                    const resDash = await fetch('/api/user/dashboard', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email: user.email }) });
                    const dash = await resDash.json();
                    
                    let kbHtml = '';
                    if(dash.tasks) dash.tasks.filter(t=>t.status==='pending'||t.status==='assigned').forEach(t => kbHtml += `<div class="kb-mini-item" onclick="openMasterModal('log','${t._id}')">🚚 ${t.reward} Task <span style="float:right; color:var(--primary); font-weight:bold;">${t.status}</span></div>`);
                    if(dash.market) dash.market.filter(t=>t.status==='available'||t.status==='reserved').forEach(t => kbHtml += `<div class="kb-mini-item" style="border-left-color:var(--success);" onclick="openMasterModal('mar','${t._id}')">🛍️ ${t.title} <span style="float:right; color:var(--success); font-weight:bold;">${t.status}</span></div>`);
                    if(dash.teamups) dash.teamups.filter(t=>t.status==='gathering').forEach(t => kbHtml += `<div class="kb-mini-item" style="border-left-color:var(--team);" onclick="openMasterModal('team','${t._id}')">🤝 ${t.title} <span style="float:right; color:var(--team); font-weight:bold;">Gathering</span></div>`);
                    
                    document.getElementById('prof_kanban_list').innerHTML = kbHtml || '<p style="text-align:center; color:var(--muted); font-size:0.85rem;">No ongoing actions.</p>';
                }
            } catch (e) { console.log(e); }
        }

        // ======================= MAPS ENGINE =======================
        function initFlatMap() {
            mapFlat = L.map('map_flat', {zoomControl: false}).setView([-36.8509, 174.7645], 14); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapFlat);
            mapFlat.on('click', async e => {
                if(markerFlat) mapFlat.removeLayer(markerFlat);
                let cI = L.divIcon({className:'custom-pin', html:`<div class="pin-wrapper" style="border-color:var(--warning)"><i class="fas fa-home" style="color:var(--warning); font-size:14px;"></i></div>`, iconSize:[34,34], iconAnchor:[17,34]});
                markerFlat = L.marker(e.latlng, {icon: cI}).addTo(mapFlat);
                document.getElementById('flat_coord_val').innerText = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                document.getElementById('fl_loc').value = "Selected on map";
            });
        }
        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([-36.8509, 174.7645], 14); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            let routingControl = L.Routing.control({ lineOptions:{styles:[{color:'#6344F5', weight:4}]}, createMarker:()=>null, show:false }).addTo(map);
            map.on('click', e => {
                if (markers.length >= 2) { markers.forEach(m => map.removeLayer(m)); markers = []; routingControl.setWaypoints([]); }
                let isStart = markers.length === 0;
                let cI = L.divIcon({className:'custom-pin', html:`<div class="pin-wrapper" style="border-color:${isStart?'var(--primary)':'var(--success)'}"><i class="fas ${isStart?'fa-street-view':'fa-flag-checkered'}" style="color:${isStart?'var(--primary)':'var(--success)'}; font-size:14px;"></i></div>`, iconSize:[34,34], iconAnchor:[17,34]});
                markers.push(L.marker(e.latlng, {icon: cI}).addTo(map));
                document.getElementById(isStart ? 'p_from' : 'p_to').value = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                if (markers.length === 2) routingControl.setWaypoints([markers[0].getLatLng(), markers[1].getLatLng()]);
            });
        }

        // Init
        window.onload = () => {
            checkAuth();
            loadFeedData();
        };
    </script>
</body>
</html>
